name: Deploy Worklane site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "worklane-site/**"
      - ".github/workflows/deploy-worklane-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Worklane artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: worklane-site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
